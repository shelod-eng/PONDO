  <text x="95" y="342" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="18">Utilize Yoco, similar hardware, or</text>
  <text x="95" y="369" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="18">SoftPOS integrations on mobile</text>
  <text x="95" y="396" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="18">to seamlessly facilitate field deliveries.</text>

  <text x="97" y="640" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="18">Maintained by KYC-cleared drivers</text>
  <text x="97" y="667" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="18">ensuring physical cash or digital</text>
  <text x="97" y="694" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="18">handovers remain secure.</text>

  <text x="1062" y="548" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Centralized</text>
  <text x="1062" y="579" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Return Protocol</text>
  <text x="1062" y="615" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="18">PED device is returned to a central</text>
  <text x="1062" y="642" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="18">location at the end of the shift to</text>
  <text x="1062" y="669" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="18">mitigate field risk and close the</text>
  <text x="1062" y="696" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="18">operational loop.</text>
